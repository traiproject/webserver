version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/infrastructure/db/queries"
    schema: "internal/infrastructure/db/migrations"
    gen:
      go:
        emit_json_tags: true
        package: "store"
        out: "internal/infrastructure/db/store"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"

          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"

          - db_type: "text"
            go_type:
              type: "string"
